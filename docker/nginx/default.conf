server {
    listen 80 default_server;
    server_name 103.168.246.50 sipraja.lomboktengahkab.go.id _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 150M;
    client_body_timeout 300s;
    client_header_timeout 60s;
    send_timeout 300s;
    keepalive_timeout 65s;
    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Jika suatu saat tetap diletakkan di belakang reverse proxy,
    # header X-Forwarded-* masih diteruskan ke PHP-FPM/Laravel.
    real_ip_header X-Forwarded-For;
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # File yang diunggah langsung ke public/uploads.
    # Cocok untuk kode yang memakai public_path('uploads/...') atau asset('uploads/...').
    location /uploads/ {
        try_files $uri $uri/ =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # File yang disimpan melalui disk Laravel public: storage/app/public.
    # Alias ini membuat /storage tetap jalan walaupun symbolic link public/storage gagal dibuat.
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # Jangan eksekusi PHP dari folder upload/public-storage.
    location ~* ^/(uploads|storage)/.*\.php$ {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_pass app:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param SERVER_NAME $host;

        fastcgi_param HTTP_HOST $host;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;

        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /(?:\.env|composer\.(?:json|lock)|package(?:-lock)?\.json|artisan|README|phpunit\.xml) {
        deny all;
    }

    location ~ /(?:storage|bootstrap/cache)/.*\.php$ {
        deny all;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
