services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: sipraja_app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sipraja

  nginx:
    image: nginx:stable-alpine
    container_name: sipraja_nginx
    restart: unless-stopped
    ports:
      # Apache host server tetap memakai port 80/443.
      # Nginx Docker SIPRAJA hanya dibuka lokal di server pada port 8080.
      - "127.0.0.1:8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - sipraja

  mysql:
    image: mysql:8.0
    container_name: sipraja_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sipraja}
      MYSQL_USER: ${DB_USERNAME:-sipraja}
      MYSQL_PASSWORD: ${DB_PASSWORD:-sipraja_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      TZ: ${APP_TIMEZONE:-Asia/Makassar}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_allowed_packet=256M
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sipraja

  queue_exports:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: sipraja_queue_exports
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    command: >
      sh -c "php -d memory_limit=512M artisan queue:work database --queue=exports --sleep=1 --tries=3 --timeout=1200 --max-time=3600"
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sipraja

  queue_imports:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: sipraja_queue_imports
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    command: >
      sh -c "php -d memory_limit=512M artisan queue:work database --queue=imports --sleep=1 --tries=3 --timeout=1200 --max-time=3600"
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sipraja

  queue_default:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: sipraja_queue_default
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    command: >
      sh -c "php -d memory_limit=256M artisan queue:work database --queue=default --sleep=3 --tries=3 --timeout=300 --max-time=3600"
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sipraja

volumes:
  mysql_data:
    driver: local

networks:
  sipraja:
    driver: bridge
