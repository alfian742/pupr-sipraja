<VirtualHost *:80>
    ServerName sipraja.lomboktengahkab.go.id
    ServerAlias 103.168.246.50

    ProxyPreserveHost On
    ProxyRequests Off

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    ErrorLog ${APACHE_LOG_DIR}/sipraja-error.log
    CustomLog ${APACHE_LOG_DIR}/sipraja-access.log combined
</VirtualHost>
