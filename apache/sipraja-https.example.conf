<VirtualHost *:80>
    ServerName sipraja.lomboktengahkab.go.id
    Redirect permanent / https://sipraja.lomboktengahkab.go.id/
</VirtualHost>

<VirtualHost *:443>
    ServerName sipraja.lomboktengahkab.go.id

    SSLEngine on
    SSLCertificateFile /path/ke/fullchain.pem
    SSLCertificateKeyFile /path/ke/privkey.pem

    ProxyPreserveHost On
    ProxyRequests Off
    AllowEncodedSlashes NoDecode

    ProxyPass / http://127.0.0.1:8080/ nocanon
    ProxyPassReverse / http://127.0.0.1:8080/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-Host "sipraja.lomboktengahkab.go.id"

    ErrorLog ${APACHE_LOG_DIR}/sipraja_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/sipraja_ssl_access.log combined
</VirtualHost>
