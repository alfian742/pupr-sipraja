<VirtualHost *:80>
    ServerName sipraja.lomboktengahkab.go.id

    ProxyPreserveHost On
    ProxyRequests Off
    AllowEncodedSlashes NoDecode

    ProxyPass / http://127.0.0.1:8080/ nocanon
    ProxyPassReverse / http://127.0.0.1:8080/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"
    RequestHeader set X-Forwarded-Host "sipraja.lomboktengahkab.go.id"

    ErrorLog ${APACHE_LOG_DIR}/sipraja_error.log
    CustomLog ${APACHE_LOG_DIR}/sipraja_access.log combined
</VirtualHost>
