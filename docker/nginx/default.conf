map "false" $phpmyadmin_allowed {
    default 0;
    ~*^true$ 1;
}

map $uri $x_robots_tag {
    default "";
    ~^/dashboard(?:/|$) "noindex, nofollow, noarchive";
    ~^/ikli-survey/dashboard(?:/|$) "noindex, nofollow, noarchive";
}

server {
    listen 80;
    server_name 103.168.246.50 sipraja.lomboktengahkab.go.id _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 100M;
    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag $x_robots_tag always;

    # hPanel pada screenshot memakai redirect 301 ke IP, bukan reverse proxy.
    # Baris real_ip tetap aman jika nanti server admin mengubah skema menjadi
    # reverse proxy, tetapi untuk akses langsung via http://103.168.246.50
    # request akan tetap diproses normal.
    real_ip_header X-Forwarded-For;
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location = /phpmyadmin {
        if ($phpmyadmin_allowed = 0) {
            return 404;
        }

        return 301 /phpmyadmin/;
    }

    location ^~ /phpmyadmin/ {
        if ($phpmyadmin_allowed = 0) {
            return 404;
        }

        resolver 127.0.0.11 valid=30s ipv6=off;
        set $phpmyadmin_backend "phpmyadmin:80";

        rewrite ^/phpmyadmin/(.*)$ /$1 break;

        proxy_pass http://$phpmyadmin_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Port $http_x_forwarded_port;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_SSL on;
        fastcgi_param HTTPS $https if_not_empty;

        include fastcgi_params;
    }

    location ~ /(?:\.env|composer\.(?:json|lock)|package(?:-lock)?\.json|artisan|README|phpunit\.xml) {
        deny all;
    }

    location ~ /(?:storage|bootstrap/cache)/.*\.php$ {
        deny all;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
